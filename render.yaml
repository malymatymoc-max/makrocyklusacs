services:
  - type: web
    name: makrocyklus
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: makrocyklus-data
      mountPath: /data
      sizeGB: 1
